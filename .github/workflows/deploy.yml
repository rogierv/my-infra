name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy-dev:
    name: Deploy (dev)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~1"

      - name: Init
        working-directory: infra/env/dev
        run: tofu init

      - name: Format check
        working-directory: infra/env/dev
        run: tofu fmt -check -recursive

      - name: Validate
        working-directory: infra/env/dev
        run: tofu validate

      - name: Plan & Apply
        working-directory: infra/env/dev
        run: tofu apply -auto-approve

  deploy-prod:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod

    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~1"

      - name: Init
        working-directory: infra/env/prod
        run: tofu init

      - name: Format check
        working-directory: infra/env/prod
        run: tofu fmt -check -recursive

      - name: Validate
        working-directory: infra/env/prod
        run: tofu validate

      - name: Plan & Apply
        working-directory: infra/env/prod
        run: tofu apply -auto-approve