name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~1"

      - name: Init
        working-directory: infra/env/dev
        run: tofu init

      - name: Format check
        working-directory: infra/env/dev
        run: tofu fmt -check -recursive

      - name: Validate
        working-directory: infra/env/dev
        run: tofu validate

      - name: Plan
        working-directory: infra/env/dev
        run: tofu plan -out=tfplan

      - name: Write plan to summary
        working-directory: infra/env/dev
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          tofu show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/env/dev/tfplan
          retention-days: 1

  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    needs: plan-dev
    environment: dev   # add required reviewers in GitHub Settings → Environments to gate apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~1"

      - name: Init
        working-directory: infra/env/dev
        run: tofu init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra/env/dev

      - name: Apply
        working-directory: infra/env/dev
        run: tofu apply -auto-approve tfplan

  plan-prod:
    name: Plan (prod)
    runs-on: ubuntu-latest
    needs: apply-dev
    environment: prod   # approval gate — prod stays pending until a reviewer explicitly approves

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~1"

      - name: Init
        working-directory: infra/env/prod
        run: tofu init

      - name: Format check
        working-directory: infra/env/prod
        run: tofu fmt -check -recursive

      - name: Validate
        working-directory: infra/env/prod
        run: tofu validate

      - name: Plan
        working-directory: infra/env/prod
        run: tofu plan -out=tfplan

      - name: Write plan to summary
        working-directory: infra/env/prod
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          tofu show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/env/prod/tfplan
          retention-days: 1

  apply-prod:
    name: Apply (prod)
    runs-on: ubuntu-latest
    needs: plan-prod
    environment: prod-apply   # second approval gate — reviewer checks plan summary before apply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~1"

      - name: Init
        working-directory: infra/env/prod
        run: tofu init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra/env/prod

      - name: Apply
        working-directory: infra/env/prod
        run: tofu apply -auto-approve tfplan

