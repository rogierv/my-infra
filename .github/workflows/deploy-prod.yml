name: Deploy Prod

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  plan-prod:
    name: Plan (prod)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~1"

      - name: Init
        working-directory: infra/env/prod
        run: tofu init

      - name: Format check
        working-directory: infra/env/prod
        run: tofu fmt -check -recursive

      - name: Validate
        working-directory: infra/env/prod
        run: tofu validate

      - name: Plan
        working-directory: infra/env/prod
        run: tofu plan -out=tfplan

      - name: Write plan summary
        working-directory: infra/env/prod
        run: |
          echo '### Plan (prod)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tofu show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/env/prod/tfplan
          retention-days: 1

  apply-prod:
    name: Apply (prod)
    runs-on: ubuntu-latest
    needs: plan-prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~1"

      - name: Init
        working-directory: infra/env/prod
        run: tofu init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra/env/prod

      - name: Apply
        working-directory: infra/env/prod
        run: tofu apply -auto-approve tfplan
